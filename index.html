<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register page</title>
    <style>
        body {
            
            background-image: url("https://tse3.mm.bing.net/th/id/OIP.L8xdSUvKHNb97I2VFUC9MwHaEo?pid=ImgDet&w=474&h=296&rs=1&o=7&rm=3");
            
            background-size: cover;
            min-height: 100vh;
        }
        .parent-container {
            background-color:linen;
            width: 40%;
            text-align: center;
            padding: 5px 10px 10px 10px;
            font-family: sans-serif;
            margin: 5% auto 0% auto;
            border-radius: 15px;
        }

       

        .form-field {
            margin: 10px 0;
            text-align: left;
        }

        .form-field input,
        textarea,
        select {
            padding: 10px;
            width: 95%;
            font-size: 0.8rem;
            border: 1px solid rgba(0, 0, 0, 0.5);
            border-radius: 5px;
        }

        .select-city {
            text-align: left;
            width: 100%;
        }

        .form-checkbox,
        .form-radio {
            width: 50%;
            margin: 10px 0;
            text-align: left;
            font-size: 0.8rem;
        }

        .form-checkbox label {
            font-size: 0.7rem;
            font-weight: bold;
        }

        .login-link {
            text-align: center;
            font-size: 0.8rem;

        }

        .btn-grad {
            background-image: linear-gradient(to right, #02AAB0 0%, #00CDAC 51%, #02AAB0 100%);
            margin: 10px auto;
            width: 80%;
            padding: 12px 45px;
            text-align: center;
            text-transform: uppercase;
            transition: 0.5s;
            background-size: 200% auto;
            color: white;
            box-shadow: 0 0 20px #eee;
            border-radius: 10px;
            display: block;
            outline: none;
            border: none;
        }
        .btn-grad:hover {
            background-position: right center;
            color: #fff;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <form class="parent-container" action="./login.html">
        <h2>REGISTER PAGE</h2>

        <div class="form-field">
            <input type="text" placeholder="Enter your name" name="name" required>
        </div>

        <div class="form-field">
            <input type="email" placeholder="Enter  your email" name="email" required>
        </div>

        <div class="form-field">
            <input type="password" placeholder="Enter your password" name="password" required>
        </div>

        <div class="form-field">
            <input type="password" placeholder="Confirm password" required>
        </div>

        <div class="form-field">
            <input type="tel" placeholder="Enter  your mobile number" name="mobile_number" required>
        </div>

        <div class="form-field">
            <textarea placeholder="Enter your address" name="address"></textarea>
        </div>

        <div class="form-radio">
            
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female
        </div>

        <div class="form-checkbox">
            <input type="checkbox"> SSC
            <input type="checkbox"> Intermediate
            <input type="checkbox"> Diploma
            <input type="checkbox"> Btech
        </div>

        <div class="form-field select-city">
            <select required>
                <option value="">Select your city</option>
                <option>Hyderabad</option>
                <option>Adilabad</option>
                <option>Vizag</option>
            </select>
        </div>

        <div class="form-checkbox">
            <input type="checkbox" required>
            I agree to the <a href="">Terms of Service</a>
        </div>

        <button class="btn-grad">Register</button>

        <div class="form-field login-link">
            <p>Already have an account? <a href="login.html">Login</a></p>
        </div>

    </form>

</body>

</html>
