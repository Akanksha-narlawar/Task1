<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loging page</title>
    <style>
        body{
            background-image: url("https://t3.ftcdn.net/jpg/08/68/51/04/360_F_868510427_vsvN67LV1zSmLMyXMOFG05tRCmTAj1xL.jpg");
            background-size:cover;
            min-height: 95vh;
        }
        .parent-container{
            background-color: skyblue;
            width: 30%;
            text-align: center;
            padding: 5px 10px;
            font-family: sans-serif;
            margin: 5% auto;
            border-radius: 10px;
        }    
        .parent-container a{
            color: blue;
            font-weight: bold;
        }
        .form-field{
            margin: 5% 0%;
        }
        .form-field input{
            padding: 10px;
            width: 80%;
            font-size: 0.7rem;
            font-weight: bold;
        }
        .btn-grad {
            background-image: linear-gradient(to right, #77A1D3 0%, #79CBCA 51%, #77A1D3 100%);
            width: 85%;
           margin: 10px auto;
           padding: 12px 45px;
           text-align: center;
           text-transform: uppercase;
           transition: 0.5s;
           background-size: 200% auto;
           color: white;
           box-shadow: 0 0 20px #eee;
           border-radius: 10px;
           display: block;
            outline: none;
            border: none;
        }
       .btn-grad:hover {
          background-position: right center;
          color: #fff;
           text-decoration: none;
        }
        .register-link{
            font-size: 0.8rem;
        }
        

        
    </style>
    
</head>
<body>
    <form  class="parent-container" action="./biography.html" >
        <h2>LOGIN PAGE</h2>
        <div class="form-field"> 
            <input type="Name" placeholder="Enter Name"/>
         </div>
        <div class="form-field">
              <input type="email" placeholder="Enter email"/>
        </div>
        <div class="form-field">
           <input type="password" placeholder="Enter password"/> 
        </div>
        <div>
            <a href="" target="_blank" class="forgot_password">Forgot password</a>
        </div>
       
             <button class="btn-grad">login</button>
       
       <div class="form-field register-link">
       <h3 class="bro"><p>Don't have an account? 
       <a href="./index.html" class="login">Register</a></h3>
       </div>
    </form>

</body>
</html>
